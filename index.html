<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Contact Driver</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <style>
        :root {
            --label-strong: #1D1F20;
            --label-primary: #3A3E41;
            --label-secondary: rgba(58, 62, 65, 0.64);
            --label-tertiary: rgba(58, 62, 65, 0.48);
            
            --background-upper: rgba(0, 35, 61, 0.02);
            --background-lower: #EFF3F5;
            --background-default: #FFFFFF;
            
            --fill-main: #48B0FF;
            --fill-main-week: rgba(72, 176, 255, 0.16);
            --fill-neutral: #45565F;
            --fill-neutral-week: rgba(69, 86, 95, 0.16);
            
            --border-default: rgba(0, 41, 61, 0.10);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--background-lower);
            color: var(--label-primary);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100dvh;
            overflow: hidden;
        }

        .VStack {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .phone-container {
            max-width: 393px; 
            width: 100%;
            height: 100dvh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(12px + env(safe-area-inset-top)) 24px calc(12px + env(safe-area-inset-bottom)) 24px;
        }

        .top-section {
            flex-shrink: 0;
        }

        .header-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .navigation-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--label-strong);
            line-height: 37px;
        }

        /* 이전 버전의 자연스러운 차량 번호판 디자인 원복 */
        .InlinePlate {
            display: inline-flex;
            align-items: center;
            background-color: var(--background-default);
            border: 1.5px solid var(--label-strong);
            border-radius: 6px;
            height: 28px;
            padding: 0 20px;
            position: relative;
            vertical-align: middle;
            margin-left: 2px;
            margin-top: -3px;
            box-shadow: 0 2px 4px rgba(0, 35, 61, 0.04);
        }

        .PlateBolt {
            width: 4px;
            height: 4px;
            background-color: var(--background-lower);
            border: 0.5px solid var(--border-default);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }

        .PlateBolt.left { left: 5px; }
        .PlateBolt.right { right: 5px; }

        .PlateText {
            font-size: 15px;
            font-weight: 700;
            color: var(--label-strong);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .navigation-subtext {
            font-size: 17px;
            font-weight: 400;
            color: var(--label-secondary);
            line-height: 25.5px;
            margin-top: 2px;
        }

        .middle-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--label-tertiary);
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-left: 4px;
            letter-spacing: 0.5px;
        }

        .ListGroup {
            background-color: var(--background-default);
            border: 1px solid var(--border-default);
            border-radius: 14px;
            padding: 0 14px;
            box-shadow: 0 4px 10px rgba(0, 35, 61, 0.02);
            overflow: hidden;
        }

        .ListRow {
            border-bottom: 1px solid var(--border-default);
        }

        .ListRow:last-child {
            border-bottom: none;
        }

        .PresetRow {
            width: 100%;
            background: none;
            border: none;
            text-align: left;
            padding: 14px 0;
            cursor: pointer;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            transition: background-color 0.15s ease;
        }
        
        .PresetRow:active {
            background-color: var(--fill-main-week);
            margin: 0 -14px;
            padding: 14px 14px;
            width: calc(100% + 28px);
        }

        .action-icon-badge {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background-color: var(--background-lower);
            color: var(--fill-main);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .preset-text-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }

        .preset-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--label-primary);
        }

        .preset-preview {
            font-size: 13px;
            color: var(--label-secondary);
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .trailing-chevron {
            color: var(--label-tertiary);
            flex-shrink: 0;
        }

        .bottom-action {
            gap: 10px;
            flex-shrink: 0;
            padding-top: 8px;
            align-items: center;
        }

        .Button {
            width: 100%;
            height: 52px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: transform 0.1s ease, opacity 0.1s ease;
            cursor: pointer;
            border: none;
        }

        .Button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .Button.primary {
            background-color: var(--fill-main);
            color: var(--background-default);
            box-shadow: 0 6px 16px rgba(72, 176, 255, 0.2);
        }

        .Button.secondary {
            background-color: var(--fill-main-week);
            color: var(--fill-main);
        }

        .brand-footer {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--label-tertiary);
            user-select: none;
        }

        .brand-logo {
            height: 13px;
            filter: grayscale(100%) contrast(80%);
            opacity: 0.32;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <div class="top-section">
            <div class="header-group">
                <h1 class="navigation-title">
                    Contact<br>
                    driver of
                    <span class="InlinePlate">
                        <span class="PlateBolt left"></span>
                        <span class="PlateText">123가 4567</span>
                        <span class="PlateBolt right"></span>
                    </span>
                </h1>
                <p class="navigation-subtext">Your phone number stays<br>private and protected</p>
            </div>
        </div>

        <div class="middle-section">
            <h2 class="section-title">Quick messages</h2>
            <div class="ListGroup VStack">
                
                <div class="ListRow">
                    <button class="PresetRow" onclick="sendSMS('Hi, your vehicle is blocking my car. Could you please move it?')">
                        <div class="action-icon-badge">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        </div>
                        <div class="preset-text-container">
                            <span class="preset-title">Car is blocking me</span>
                            <span class="preset-preview">Could you please move your vehicle?</span>
                        </div>
                        <div class="trailing-chevron">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </div>
                    </button>
                </div>

                <div class="ListRow">
                    <button class="PresetRow" onclick="sendSMS('Hi, your vehicle is blocking the driveway or exit.')">
                        <div class="action-icon-badge">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        </div>
                        <div class="preset-text-container">
                            <span class="preset-title">Blocking the exit</span>
                            <span class="preset-preview">Your vehicle is blocking the exit path.</span>
                        </div>
                        <div class="trailing-chevron">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </div>
                    </button>
                </div>

                <div class="ListRow">
                    <button class="PresetRow" onclick="sendSMS('Hi, there seems to be an issue with your vehicle. Please check it.')">
                        <div class="action-icon-badge">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        </div>
                        <div class="preset-text-container">
                            <span class="preset-title">Issue with vehicle</span>
                            <span class="preset-preview">There seems to be an issue with your car.</span>
                        </div>
                        <div class="trailing-chevron">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </div>
                    </button>
                </div>

            </div>
        </div>

        <div class="bottom-action VStack">
            <a href="tel:05012345678" class="Button primary">Call Driver</a>
            <a href="sms:05012345678" class="Button secondary">Text Driver</a>
            
            <div class="brand-footer">
                <span>by</span>
                <img src="logo.svg" class="brand-logo" alt="took">
            </div>
        </div>

    </div>

    <script>
        // 시스템 연동 전화번호 050 안심번호 반영
        function sendSMS(message) {
            const targetNumber = "05012345678";
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const separator = isIOS ? '&' : '?';
            window.location.href = `sms:${targetNumber}${separator}body=${encodeURIComponent(message)}`;
        }
    </script>
</body>
</html>
